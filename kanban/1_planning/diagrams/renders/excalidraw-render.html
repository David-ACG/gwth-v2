<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Excalidraw-Style - GWTH Unified Workflow</title>
  <style>
    body { margin: 0; padding: 40px; background: #ffffff; display: flex; flex-direction: column; align-items: center; }
    h2 { font-family: sans-serif; text-align: center; color: #333; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h2>2. Excalidraw (Hand-Drawn JSON — roughness=2, Virgil font)</h2>
  <div id="diagram"></div>
  <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
  <script>
    // This renders the Excalidraw JSON data using rough.js to match the hand-drawn look
    // Font: Virgil (Excalidraw's hand-drawn font) simulated with cursive fallback
    const elements = [
      // Group backgrounds
      { type: "rect", x: 20, y: 20, w: 680, h: 120, fill: "#a5d8ff", opacity: 0.3, label: "Idea Intake", labelX: 360, labelY: 38, labelSize: 20 },

      // Intake nodes
      { type: "rect", x: 40, y: 60, w: 180, h: 60, fill: "#b2f2bb", label: "Phone/Linear\n(idea label)", labelX: 130, labelY: 82 },
      { type: "rect", x: 260, y: 60, w: 180, h: 60, fill: "#ffd8a8", label: "Claude Session\n(bd create)", labelX: 350, labelY: 82 },
      { type: "rect", x: 480, y: 60, w: 180, h: 60, fill: "#d0bfff", label: "Manual\n(.md file)", labelX: 570, labelY: 82 },

      // Sync
      { type: "rect", x: 40, y: 200, w: 220, h: 70, fill: "#fff3bf", label: "unified-sync.py\nHourly @ :00\nLinear > Beads > Kanban", labelX: 150, labelY: 222, labelSize: 13 },

      // Pipeline
      { type: "rect", x: 300, y: 200, w: 160, h: 60, fill: "#c3fae8", label: "0_idea/\nRaw ideas", labelX: 380, labelY: 222 },
      { type: "diamond", x: 320, y: 320, w: 120, h: 80, fill: "#ffc9c9", label: "Review\n& Triage", labelX: 380, labelY: 352, labelSize: 13 },
      { type: "rect", x: 290, y: 450, w: 180, h: 60, fill: "#a5d8ff", label: "1_planning/\nPROMPT_*.md", labelX: 380, labelY: 472 },
      { type: "rect", x: 270, y: 560, w: 220, h: 80, fill: "#ffd8a8", label: "run-kanban.sh\nbd stats + bd ready\nAuto-claim + Execute", labelX: 380, labelY: 582, labelSize: 13 },
      { type: "rect", x: 290, y: 700, w: 180, h: 60, fill: "#d0bfff", label: "2_testing/\nVerify on P520", labelX: 380, labelY: 722 },
      { type: "rect", x: 270, y: 820, w: 220, h: 70, fill: "#b2f2bb", label: "promote.sh\nDeploy to Hetzner\nbd linear sync --push", labelX: 380, labelY: 838, labelSize: 12 },
      { type: "rect", x: 310, y: 940, w: 140, h: 50, fill: "#b2f2bb", fillStyle: "solid", label: "3_done/\nArchived", labelX: 380, labelY: 957 },

      // Monitor
      { type: "rect", x: 560, y: 500, w: 200, h: 120, fill: "#ffc9c9", label: "heartbeat.py\nHourly @ :30\n---\nSync freshness\nP520 + Hetzner health\nDolt server check\nBeads stats", labelX: 660, labelY: 520, labelSize: 11 },
      { type: "rect", x: 590, y: 660, w: 140, h: 50, fill: "#a5d8ff", label: "Telegram\n(alerts only)", labelX: 660, labelY: 677, labelSize: 12 }
    ];

    const edges = [
      // Intake arrows
      { x1: 130, y1: 120, x2: 150, y2: 200 },  // phone -> sync
      { x1: 350, y1: 120, x2: 380, y2: 200 },  // claude -> idea
      { x1: 570, y1: 120, x2: 420, y2: 200 },  // manual -> idea
      { x1: 260, y1: 235, x2: 300, y2: 230 },  // sync -> idea

      // Pipeline arrows
      { x1: 380, y1: 260, x2: 380, y2: 320 },  // idea -> review
      { x1: 380, y1: 400, x2: 380, y2: 450 },  // review -> planning
      { x1: 380, y1: 510, x2: 380, y2: 560 },  // planning -> execute
      { x1: 380, y1: 640, x2: 380, y2: 700 },  // execute -> testing
      { x1: 380, y1: 760, x2: 380, y2: 820 },  // testing -> promote
      { x1: 380, y1: 890, x2: 380, y2: 940 },  // promote -> done

      // Monitor arrow
      { x1: 660, y1: 620, x2: 660, y2: 660 },  // heartbeat -> telegram

      // Feedback arrow (dashed)
      { x1: 270, y1: 600, x2: 150, y2: 270, dashed: true, label: "bd close" }
    ];

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "800");
    svg.setAttribute("height", "1020");
    svg.setAttribute("viewBox", "0 0 800 1020");
    document.getElementById("diagram").appendChild(svg);

    const rc = rough.svg(svg);

    // Render elements
    elements.forEach(el => {
      const options = {
        fill: el.fill,
        fillStyle: el.fillStyle || 'hachure',
        fillWeight: el.opacity ? 0.3 : 1,
        roughness: 2,
        stroke: '#1e1e1e',
        strokeWidth: 2,
        hachureGap: el.opacity ? 10 : 5,
        seed: Math.floor(Math.random() * 10000)
      };

      if (el.opacity) {
        options.fillWeight = 0.3;
        options.strokeWidth = 1.5;
        options.stroke = '#999';
      }

      if (el.type === "rect") {
        svg.appendChild(rc.rectangle(el.x, el.y, el.w, el.h, options));
      } else if (el.type === "diamond") {
        const cx = el.x + el.w / 2;
        const cy = el.y + el.h / 2;
        svg.appendChild(rc.polygon([
          [cx, el.y], [el.x + el.w, cy], [cx, el.y + el.h], [el.x, cy]
        ], options));
      }

      // Label
      if (el.label) {
        const lines = el.label.split('\n');
        const lineHeight = (el.labelSize || 15) + 2;
        const startY = el.labelY;
        lines.forEach((line, i) => {
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", el.labelX);
          text.setAttribute("y", startY + i * lineHeight);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("dominant-baseline", "middle");
          // Virgil font simulation
          text.setAttribute("font-family", "'Segoe Print', 'Comic Sans MS', 'Caveat', cursive");
          text.setAttribute("font-size", el.labelSize || 15);
          text.setAttribute("fill", "#1e1e1e");
          text.textContent = line;
          svg.appendChild(text);
        });
      }
    });

    // Render edges
    edges.forEach(e => {
      const lineOpts = {
        roughness: 2,
        stroke: '#1e1e1e',
        strokeWidth: 2,
        seed: Math.floor(Math.random() * 10000)
      };
      if (e.dashed) {
        lineOpts.strokeLineDash = [8, 6];
        lineOpts.strokeWidth = 1.5;
      }

      svg.appendChild(rc.line(e.x1, e.y1, e.x2, e.y2, lineOpts));

      // Arrowhead
      const angle = Math.atan2(e.y2 - e.y1, e.x2 - e.x1);
      const len = 12;
      const p1x = e.x2 - len * Math.cos(angle - 0.35);
      const p1y = e.y2 - len * Math.sin(angle - 0.35);
      const p2x = e.x2 - len * Math.cos(angle + 0.35);
      const p2y = e.y2 - len * Math.sin(angle + 0.35);
      svg.appendChild(rc.polygon([[e.x2, e.y2], [p1x, p1y], [p2x, p2y]], {
        fill: '#1e1e1e', stroke: '#1e1e1e', roughness: 0.5, strokeWidth: 1
      }));

      // Edge label
      if (e.label) {
        const mx = (e.x1 + e.x2) / 2;
        const my = (e.y1 + e.y2) / 2;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", mx - 30);
        text.setAttribute("y", my);
        text.setAttribute("font-family", "'Segoe Print', 'Comic Sans MS', cursive");
        text.setAttribute("font-size", "12");
        text.setAttribute("fill", "#666");
        text.textContent = e.label;
        svg.appendChild(text);
      }
    });

    document.title = "RENDERED";
  </script>
</body>
</html>
