<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1656, height=801">
    <title>GWTH.ai - AI Learning Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1656px;
            height: 801px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #0A0A0B 0%, #1A1A2E 50%, #0F0F1B 100%);
        }
        .container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neural-network {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.3;
        }
        .node {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00BCD4;
            border-radius: 50%;
            box-shadow: 0 0 20px #00BCD4;
        }
        .connection {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00BCD4, transparent);
            opacity: 0.5;
        }
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: #0A0A0B;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00BCD4;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.5);
        }
        .logo-text {
            font-size: 36px;
            font-weight: bold;
            color: #00BCD4;
        }
        h1 {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFFFFF 0%, #00BCD4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(0, 188, 212, 0.5);
        }
        .subtitle {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        .icons {
            display: flex;
            justify-content: center;
            gap: 60px;
        }
        .icon-card {
            width: 120px;
            height: 120px;
            background: rgba(0, 188, 212, 0.1);
            border: 1px solid rgba(0, 188, 212, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .icon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 188, 212, 0.3);
        }
        .icon {
            font-size: 48px;
            color: #00BCD4;
        }
        .glow-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 188, 212, 0.2) 0%, transparent 70%);
            filter: blur(60px);
        }
        .orb1 {
            top: -200px;
            left: -200px;
        }
        .orb2 {
            bottom: -200px;
            right: -200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow-orb orb1"></div>
        <div class="glow-orb orb2"></div>
        
        <svg class="neural-network" viewBox="0 0 1656 801">
            <!-- Neural network connections -->
            <line x1="200" y1="200" x2="400" y2="300" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="400" y1="300" x2="600" y2="250" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="600" y1="250" x2="800" y2="400" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="800" y1="400" x2="1000" y2="350" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="1000" y1="350" x2="1200" y2="450" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="1200" y1="450" x2="1400" y2="300" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            
            <line x1="300" y1="500" x2="500" y2="550" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="500" y1="550" x2="700" y2="500" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="700" y1="500" x2="900" y2="600" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="900" y1="600" x2="1100" y2="550" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            <line x1="1100" y1="550" x2="1300" y2="600" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
            
            <!-- Neural network nodes -->
            <circle cx="200" cy="200" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="400" cy="300" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="600" cy="250" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="800" cy="400" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="1000" cy="350" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="1200" cy="450" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="1400" cy="300" r="4" fill="#00BCD4" opacity="0.6"/>
            
            <circle cx="300" cy="500" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="500" cy="550" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="700" cy="500" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="900" cy="600" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="1100" cy="550" r="4" fill="#00BCD4" opacity="0.6"/>
            <circle cx="1300" cy="600" r="4" fill="#00BCD4" opacity="0.6"/>
        </svg>
        
        <div class="content">
            <div class="logo">
                <span class="logo-text">G</span>
            </div>
            <h1>Welcome to GWTH.ai</h1>
            <p class="subtitle">Your AI Learning Journey Begins Here</p>
            <div class="icons">
                <div class="icon-card">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
                        <path d="M9 12l2 2 4-4"/>
                    </svg>
                </div>
                <div class="icon-card">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div class="icon-card">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
                <div class="icon-card">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6"/>
                        <polyline points="8 6 2 12 8 18"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
