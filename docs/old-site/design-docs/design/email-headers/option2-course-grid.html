<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1656, height=801">
    <title>GWTH.ai - Course Module Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1656px;
            height: 801px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
            background: #0A0A0B;
        }
        .mesh-background {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                linear-gradient(#00BCD4 1px, transparent 1px),
                linear-gradient(90deg, #00BCD4 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 60px;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(0, 188, 212, 0.1), rgba(0, 188, 212, 0.2));
            border: 2px solid #00BCD4;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.4);
            backdrop-filter: blur(10px);
        }
        .logo-text {
            font-size: 48px;
            font-weight: bold;
            color: #00BCD4;
            text-shadow: 0 0 20px rgba(0, 188, 212, 0.8);
        }
        .title-section {
            flex: 1;
        }
        h1 {
            font-size: 56px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 1200px;
        }
        .course-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 188, 212, 0.3);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00BCD4, transparent);
        }
        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 188, 212, 0.2);
            border-color: #00BCD4;
            background: rgba(0, 188, 212, 0.05);
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00BCD4;
            font-size: 40px;
            position: relative;
        }
        .icon-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 188, 212, 0.3) 0%, transparent 70%);
            filter: blur(20px);
        }
        .course-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-align: center;
        }
        .course-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
        }
        .orb1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00BCD4, transparent);
            top: -200px;
            right: -200px;
        }
        .orb2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #7C4DFF, transparent);
            bottom: -150px;
            left: -150px;
        }
    </style>
</head>
<body>
    <div class="mesh-background"></div>
    <div class="gradient-orb orb1"></div>
    <div class="gradient-orb orb2"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="logo-text">G</span>
            </div>
            <div class="title-section">
                <h1>GWTH.ai Course Modules</h1>
                <p class="subtitle">Master AI Development Step by Step</p>
            </div>
        </div>
        
        <div class="grid">
            <div class="course-card">
                <div class="icon-wrapper">
                    <div class="icon-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                </div>
                <div class="course-name">Python Fundamentals</div>
                <div class="course-desc">Core programming concepts</div>
            </div>
            
            <div class="course-card">
                <div class="icon-wrapper">
                    <div class="icon-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6"/>
                        <polyline points="8 6 2 12 8 18"/>
                    </svg>
                </div>
                <div class="course-name">Web Development</div>
                <div class="course-desc">Modern JavaScript & React</div>
            </div>
            
            <div class="course-card">
                <div class="icon-wrapper">
                    <div class="icon-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <circle cx="12" cy="12" r="8"/>
                        <circle cx="12" cy="12" r="11"/>
                    </svg>
                </div>
                <div class="course-name">Machine Learning</div>
                <div class="course-desc">AI & Neural Networks</div>
            </div>
            
            <div class="course-card">
                <div class="icon-wrapper">
                    <div class="icon-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="20" x2="12" y2="10"/>
                        <line x1="18" y1="20" x2="18" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="16"/>
                    </svg>
                </div>
                <div class="course-name">Data Science</div>
                <div class="course-desc">Analytics & Visualization</div>
            </div>
            
            <div class="course-card">
                <div class="icon-wrapper">
                    <div class="icon-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                    </svg>
                </div>
                <div class="course-name">Cloud Computing</div>
                <div class="course-desc">AWS & Infrastructure</div>
            </div>
            
            <div class="course-card">
                <div class="icon-wrapper">
                    <div class="icon-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="4"/>
                        <line x1="21.17" y1="8" x2="12" y2="8"/>
                        <line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
                        <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
                    </svg>
                </div>
                <div class="course-name">DevOps</div>
                <div class="course-desc">CI/CD & Automation</div>
            </div>
        </div>
    </div>
</body>
</html>
